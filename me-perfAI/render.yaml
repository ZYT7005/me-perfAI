# Render Blueprint — 在 Render 控制台用 "New Blueprint" 连接仓库后部署
# 请在面板中为 PAGE_SPEED_API_KEY 填写密钥（勿写入仓库）
services:
  - type: web
    name: me-perfai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PAGE_SPEED_API_KEY
        sync: false
